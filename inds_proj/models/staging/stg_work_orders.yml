version: 2

models:
  - name: stg_work_orders
    description: "Staging model for work order records for maintenance. Cleans and standardizes work order data."
    columns:
      - name: workorder_id
        description: "Unique identifier for each work order."
        tests:
          - not_null
          - unique
      - name: asset_id
        description: "Foreign key to stg_asset_master."
        tests:
          - not_null
          - relationships:
              to: ref('stg_asset_master')
              field: asset_id
      - name: open_date
        description: "Date the work order was opened."
        tests:
          - not_null
      - name: maintenance_type
        description: "Type of maintenance (Preventive, Corrective, Inspection)."
        tests:
          - not_null
          - accepted_values:
              values: ["Preventive", "Corrective", "Inspection"]
      - name: priority
        description: "Priority of the work order (High, Medium, Low)."
        tests:
          - not_null
          - accepted_values:
              values: ["High", "Medium", "Low"]
